<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Practice — Smarter Games</title>
<!-- Optional LOCAL dev config (gitignored): window.__WS_CONFIG__ = {restUrl, anonKey, name, pin}.
     Generated by workspace/gen-config.mjs from `supabase status`. 404s harmlessly if absent. -->
<script src="./config.local.js" onerror="void 0"></script>
<style>
  :root{
    --bg:#05040f; --card:rgba(20,28,60,.92); --ink:#dfe9ff; --muted:#9fb6e8;
    --cyan:#7ee8fa; --gold:#ffd36e; --orange:#ff8e3c; --mint:#86efac; --rose:#fda4af;
    --line:rgba(126,232,250,.22);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:ui-rounded,'Trebuchet MS','Segoe UI',system-ui,sans-serif;
    color:var(--ink); background:radial-gradient(ellipse at 50% 16%,#141238,#08061c 55%,#03020a) fixed var(--bg);
    -webkit-tap-highlight-color:transparent; user-select:none; min-height:100dvh;
  }
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 40px;min-height:100dvh;display:flex;flex-direction:column;gap:18px}
  .topbar{display:flex;align-items:center;gap:12px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:8px 14px;font-weight:bold}
  .skill{font-size:20px;font-weight:800}
  .skill .ico{font-size:26px}
  .dots{display:flex;gap:8px;margin-left:auto}
  .dot{width:12px;height:12px;border-radius:50%;background:rgba(159,182,232,.28)}
  .dot.done{background:var(--mint)} .dot.wrong{background:var(--rose)} .dot.cur{background:var(--cyan);transform:scale(1.25)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px 20px;
    box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .problem{font-size:clamp(48px,15vw,84px);font-weight:900;text-align:center;letter-spacing:2px;
    text-shadow:0 0 24px rgba(126,232,250,.25)}
  .prompt{text-align:center;color:var(--muted);margin-top:6px;font-size:15px}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  .choice{min-height:72px;border-radius:18px;border:2px solid var(--line);background:rgba(13,20,44,.9);
    color:var(--ink);font-size:34px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:transform .08s,border-color .12s,background .12s}
  .choice:hover{border-color:var(--cyan)} .choice:active{transform:scale(.96)}
  .choice.right{background:rgba(134,239,172,.2);border-color:var(--mint)}
  .choice.wrong{background:rgba(253,164,175,.18);border-color:var(--rose)}
  .choice:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}
  .kbd{text-align:center;color:var(--muted);font-size:13px;margin-top:4px}
  /* readout */
  .hidden{display:none!important}
  .readTitle{font-size:24px;font-weight:900;text-align:center}
  .stat{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:6px}
  .stat .box{background:rgba(13,20,44,.9);border:1px solid var(--line);border-radius:16px;padding:12px 20px;text-align:center;min-width:104px}
  .stat .big{font-size:32px;font-weight:900}
  .stat .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .meter{height:16px;border-radius:999px;background:rgba(159,182,232,.18);overflow:hidden;margin-top:14px}
  .meter>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--mint));width:0;transition:width .6s}
  .next{display:flex;align-items:center;gap:14px;background:rgba(255,211,110,.12);border:1px solid rgba(255,211,110,.4);
    border-radius:18px;padding:16px;margin-top:16px}
  .next .ico{font-size:34px} .next b{color:var(--gold)} .next p{color:var(--ink);font-size:15px;margin-top:2px}
  .btn{min-height:52px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:17px;
    padding:0 28px;color:#08121f;background:linear-gradient(180deg,#96f2ff,#59ccf5);box-shadow:0 6px 18px rgba(80,190,255,.3)}
  .btn:active{transform:translateY(1px)}
  .rec{display:flex;align-items:center;gap:8px;justify-content:center;color:var(--mint);font-weight:bold;margin-top:12px}
  .rec.err{color:var(--rose)}
  .note{color:var(--muted);font-size:12.5px;text-align:center;line-height:1.5;margin-top:auto}
  @media (max-width:420px){ .choices{grid-template-columns:1fr 1fr} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="skill"><span class="ico" aria-hidden="true">➕</span> <span id="skillName">Add within 5</span></span>
    <div class="dots" id="dots" aria-hidden="true"></div>
  </div>

  <!-- PRACTICE -->
  <section id="play">
    <div class="card">
      <div class="problem" id="problem" aria-live="polite">— + —</div>
      <div class="prompt">Tap your answer, or press its number</div>
    </div>
    <div class="choices" id="choices" role="group" aria-label="Answer choices"></div>
    <div class="kbd">Keyboard: press 1–4, or type the number and Enter</div>
  </section>

  <!-- READOUT -->
  <section id="done" class="hidden" aria-live="polite">
    <div class="card">
      <div class="readTitle">🎉 Nice work!</div>
      <div class="stat">
        <div class="box"><div class="big" id="rCorrect" style="color:var(--mint)">0</div><div class="lab">Correct</div></div>
        <div class="box"><div class="big" id="rTotal" style="color:var(--cyan)">0</div><div class="lab">Answered</div></div>
        <div class="box"><div class="big" id="rMastery" style="color:var(--gold)">0%</div><div class="lab">Mastery</div></div>
      </div>
      <div class="meter"><span id="rBar"></span></div>
      <div class="next" id="nextCard">
        <span class="ico" id="nextIco" aria-hidden="true">⭐</span>
        <div><b id="nextTitle">Keep practicing</b><p id="nextReason"></p></div>
      </div>
      <div class="rec" id="recLine">✓ recorded</div>
    </div>
    <div style="text-align:center"><button class="btn" id="again">Practice again</button></div>
  </section>

  <p class="note" id="note"></p>
</div>

<script type="module">
import { recordAttempt } from '../contracts/capture.mjs'
import { initialMastery, updateMastery, masteryOf } from '../contracts/mastery.mjs'
import { nextBestActivity } from '../contracts/activity.mjs'

// ---- LOCAL dev config: window.__WS_CONFIG__ (injected by test / config.local.js),
//      else localhost defaults. anonKey is the well-known local dev key when a
//      config file supplies it; there is NO prod key here and restUrl is localhost. ----
const CFG = Object.assign({
  restUrl: 'http://127.0.0.1:54321/rest/v1',
  anonKey: '',                 // supplied by config.local.js or the test (local dev key)
  name: 'RoundTrip', pin: '2468',   // the seeded, consented LOCAL test child
  record: true,                // flag-gated recording (local only)
  setSize: 5,
  skill: { key:'add5', tag:'addition', stageIndex:0, name:'Add within 5' },
}, window.__WS_CONFIG__ || {})

const uuid = () => (crypto.randomUUID ? crypto.randomUUID()
  : 'xxxxxxxx-xxxx-4xxx-8xxx-xxxxxxxxxxxx'.replace(/x/g,()=>(Math.random()*16|0).toString(16)))
const rnd = n => Math.floor(Math.random()*n)

document.getElementById('skillName').textContent = CFG.skill.name

// ---- build a small set for ONE skill (add within 5) ----
function makeProblem(){
  const s = 2 + rnd(4);              // sum 2..5
  const a = 1 + rnd(s-1), b = s - a; // a,b >= 1
  const ans = a + b;
  const opts = new Set([ans]);
  while(opts.size < 4){ const d = ans + (rnd(5)-2); if(d>=0 && d<=9) opts.add(d); }
  return { text:`${a} + ${b}`, answer:ans, options:[...opts].sort(()=>rnd(3)-1) }
}

let session, problems, idx, shownAt, events, correctCount;
function startSet(){
  session = uuid();
  problems = Array.from({length:CFG.setSize}, makeProblem);
  idx = 0; events = []; correctCount = 0;
  document.getElementById('done').classList.add('hidden');
  document.getElementById('play').classList.remove('hidden');
  renderDots(); renderProblem();
}
function renderDots(){
  const d = document.getElementById('dots'); d.innerHTML='';
  problems.forEach((p,i)=>{ const s=document.createElement('span'); s.className='dot'+(i<idx?(p.correct?' done':' wrong'):i===idx?' cur':''); s.dataset.i=i; d.appendChild(s); });
}
function renderProblem(){
  const p = problems[idx];
  document.getElementById('problem').textContent = p.text;
  const c = document.getElementById('choices'); c.innerHTML='';
  p.options.forEach((opt,i)=>{
    const b = document.createElement('button');
    b.className='choice'; b.type='button'; b.textContent=opt; b.dataset.val=opt;
    b.setAttribute('aria-label', `${p.text} equals ${opt}`);
    b.addEventListener('click',()=>answer(opt,'tap',b));
    c.appendChild(b);
  });
  shownAt = performance.now();
}

function answer(val, method, btn){
  const p = problems[idx];
  if(p.answered) return; p.answered = true;
  const correct = Number(val) === p.answer;
  p.correct = correct;
  if(correct) correctCount++;
  // feedback
  if(btn){ btn.classList.add(correct?'right':'wrong'); }
  document.querySelectorAll('#dots .dot')[idx].className = 'dot '+(correct?'done':'wrong');
  // ---- each answer -> AttemptEvent (frozen contract) ----
  events.push({
    clientAttemptId: uuid(), clientSessionId: session,
    stageIndex: CFG.skill.stageIndex, skill: CFG.skill.tag,
    result: correct ? 'correct' : 'incorrect',
    problemText: p.text, correctAnswer: p.answer, chosenAnswer: Number(val),
    responseMs: Math.round(performance.now()-shownAt), inputMethod: method,
    asrConfidence: null, runTimeS: (performance.now()/1000), level: 1, mode: 'journey',
    context: { source:'workspace', skillKey: CFG.skill.key, setId: session },
  });
  setTimeout(()=>{ idx++; (idx>=problems.length) ? finish() : (renderDots(), renderProblem()); }, 420);
}

// keyboard: 1-4 select, or type + Enter
let typed='';
window.addEventListener('keydown', e=>{
  if(document.getElementById('play').classList.contains('hidden')) return;
  const p = problems[idx]; if(!p || p.answered) return;
  if(/^[1-4]$/.test(e.key)){ const b=document.querySelectorAll('.choice')[+e.key-1]; if(b) answer(b.dataset.val,'typed',b); }
  else if(/^[0-9]$/.test(e.key)){ typed=(typed+e.key).slice(-2); }
  else if(e.key==='Enter' && typed){ const b=[...document.querySelectorAll('.choice')].find(x=>x.dataset.val===String(+typed)); answer(typed, 'typed', b); typed=''; }
});

async function finish(){
  document.getElementById('play').classList.add('hidden');
  document.getElementById('done').classList.remove('hidden');
  // ---- flush the session's AttemptEvents through recordAttempt (batch) ----
  const rec = document.getElementById('recLine');
  let recorded = 0;
  if(CFG.record && CFG.anonKey){
    try{
      const res = await recordAttempt(
        { restUrl:CFG.restUrl, anonKey:CFG.anonKey },
        { name:CFG.name, pin:CFG.pin }, events,
        { startedAt:new Date(Date.now()-events.length*8000).toISOString(), endedAt:new Date().toISOString() });
      if(res && res.ok){ recorded = res.inserted; rec.textContent = `✓ recorded ${recorded} attempt${recorded===1?'':'s'} for this pilot`; }
      else { rec.className='rec err'; rec.textContent = `⚠ not recorded (${res && res.error || 'error'})`; }
    }catch(err){ rec.className='rec err'; rec.textContent='⚠ could not reach the local stack'; }
  } else { rec.className='rec err'; rec.textContent='⚠ recording off (no local config)'; }

  // ---- READOUT — derived ONLY from what was actually recorded this session ----
  // Mastery via the SAME updateMastery model the server uses (Milestone-1 local
  // read path; the authoritative server-side read arrives with auth later).
  let m = initialMastery(CFG.skill.key);
  const now = new Date().toISOString();
  for(const ev of events) m = updateMastery(m, { result: ev.result, at: now });
  const mastery = masteryOf(m.alpha, m.beta).mastery;
  document.getElementById('rCorrect').textContent = correctCount;
  document.getElementById('rTotal').textContent = events.length;
  document.getElementById('rMastery').textContent = Math.round(mastery*100)+'%';
  requestAnimationFrame(()=>{ document.getElementById('rBar').style.width = Math.round(mastery*100)+'%'; });

  const nba = nextBestActivity({ skillKey:CFG.skill.key, mastery, attempts:events.length, correct:correctCount });
  document.getElementById('nextIco').textContent = nba.icon;
  document.getElementById('nextTitle').textContent =
    nba.action==='advance' ? 'Ready for the next skill' : nba.action==='ease' ? 'Keep practicing this' : 'Keep practicing';
  document.getElementById('nextReason').textContent = nba.reason;

  // expose the turn for the self-test (session events + counts + mastery)
  window.__WS_RESULT__ = { session, events, correct:correctCount, total:events.length, mastery, recorded, next:nba };
}

document.getElementById('again').addEventListener('click', startSet);
document.getElementById('note').textContent =
  'Local practice · records to the local stack only · pilot ' + CFG.name;
startSet();
</script>
</body>
</html>
